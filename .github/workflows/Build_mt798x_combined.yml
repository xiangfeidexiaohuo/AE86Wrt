name: Build_mt798x_combined

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '10 23 * * 4'

jobs:
  build:
    name: Build ${{ matrix.description }} ${{ matrix.kernel || '5.4' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ───────────── 5.4 kernel ─────────────
          - soc: "mt7981"
            kernel: "5.4"
            config_file: "./configs/ARM/mt798x/mt7981.config"
            config_name: "mt7981.config"
            description: "AE86Wrt-MT7981"
            type: "standard"
            repo_url: "https://github.com/hanwckf/immortalwrt-mt798x"
            repo_branch: "openwrt-21.02"
            pre_script: "op1.sh"
            post_script: "op2.sh"

          - soc: "mt7986"
            kernel: "5.4"
            config_file: "./configs/ARM/mt798x/mt7986.config"
            config_name: "mt7986.config"
            description: "AE86Wrt-MT7986"
            type: "standard"
            repo_url: "https://github.com/hanwckf/immortalwrt-mt798x"
            repo_branch: "openwrt-21.02"
            pre_script: "op1.sh"
            post_script: "op2.sh"


          # ───────────── 6.6 kernel ─────────────
          - soc: "filogic"
            kernel: "6.6"
            config_file: "./configs/ARM/mt798x/7981_66.config"
            config_name: "7981_66.config"
            description: "AE86Wrt-MT7981"
            type: "7981_66"
            repo_url: "https://github.com/padavanonly/immortalwrt-mt798x-6.6"
            repo_branch: "openwrt-24.10-6.6"
            pre_script: "imm1.sh"
            post_script: "imm2.sh"

    steps:
      - name: Clone Repository
        uses: actions/checkout@main

      - name: Free disk space
        uses: xiangfeidexiaohuo/actions@free-disk
        with:
          build-mount-path: /home/runner/work/AE86Wrt/AE86Wrt

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          sudo apt-get update -y
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp libnsl-dev nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libfuse-dev python3-setuptools g++ file clang nano genisoimage
          sudo apt-get clean
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'noreply@github.com'

      - name: Clone source code
        env:
          REPO_URL: ${{ matrix.repo_url }}
          REPO_BRANCH: ${{ matrix.repo_branch }}
        run: |
          git clone https://github.com/xiangfeidexiaohuo/AE86Wrt.git && mv ./AE86Wrt/* ./ && rm -rf ./AE86Wrt
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt-${{ matrix.soc }}
          cd openwrt-${{ matrix.soc }}
          cp -f ../diy/mt798x/${{ matrix.pre_script }} ./
          chmod +x ./${{ matrix.pre_script }} && ./${{ matrix.pre_script }}

      - name: Update & Install feeds
        working-directory: ./openwrt-${{ matrix.soc }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp -f ../diy/mt798x/${{ matrix.post_script }} ./
          chmod +x ./${{ matrix.post_script }} && ./${{ matrix.post_script }}
          sed -i "s/DISTRIB_DESCRIPTION='*.*'/DISTRIB_DESCRIPTION='${{ matrix.description }}-${{ matrix.kernel }}-$(date +%Y%m%d)'/g" package/base-files/files/etc/openwrt_release
          sed -i "s/OPENWRT_RELEASE=\"*.*\"/OPENWRT_RELEASE=\"${{ matrix.description }}-${{ matrix.kernel }}-$(date +%Y%m%d) By DaoDao\"/g" package/base-files/files/usr/lib/os-release

      - name: Configuration Customization
        run: |
          [ -e "${{ matrix.config_file }}" ] && mv "${{ matrix.config_file }}" openwrt-${{ matrix.soc }}/.config
          cd openwrt-${{ matrix.soc }} && make defconfig

      - name: Download package
        working-directory: ./openwrt-${{ matrix.soc }}
        run: |
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        working-directory: ./openwrt-${{ matrix.soc }}
        run: |
          make -j$(nproc) V=s

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          mkdir -p ${{ matrix.soc }}_${{ matrix.kernel }}_out
          cp openwrt-${{ matrix.soc }}/.config ${{ matrix.soc }}_${{ matrix.kernel }}_out/${{ matrix.config_name }}

          getmd5() {
            md5sum=`md5sum "$1"`
            md5=`echo ${md5sum%  *}`
            echo ${md5:0:10}
          }

          DATE=$(date +%Y%m%d)

          if [ "${{ matrix.type }}" = "standard" ]; then
            models_json='[
              {"name": "Redmi-AX6000",              "output_file": "immortalwrt-mediatek-mt7986-xiaomi_redmi-router-ax6000-squashfs-sysupgrade.bin"},
              {"name": "JDCloud-AX6000",            "output_file": "immortalwrt-mediatek-mt7986-jdcloud_re-cp-03-squashfs-sysupgrade.bin"},
              {"name": "Netcore-N60",               "output_file": "immortalwrt-mediatek-mt7986-netcore_n60-squashfs-sysupgrade.bin"},
              {"name": "360-T7",                    "output_file": "immortalwrt-mediatek-mt7981-mt7981-360-t7-108M-squashfs-sysupgrade.bin"},
              {"name": "KOMI-A31",                  "output_file": "immortalwrt-mediatek-mt7981-konka_komi-a31-squashfs-sysupgrade.bin"},
              {"name": "Xiaomi-AX3000T-MTK",        "output_file": "immortalwrt-mediatek-mt7981-xiaomi_mi-router-ax3000t-squashfs-sysupgrade.bin"},
              {"name": "Xiaomi-AX3000T-MTK_an8855", "output_file": "immortalwrt-mediatek-mt7981-xiaomi_mi-router-ax3000t-an8855-squashfs-sysupgrade.bin"},
              {"name": "Cetron-CT3003",             "output_file": "immortalwrt-mediatek-mt7981-cetron_ct3003-squashfs-sysupgrade.bin"},
              {"name": "CMCC-RAX3000M",             "output_file": "immortalwrt-mediatek-mt7981-cmcc_rax3000m-squashfs-sysupgrade.bin"},
              {"name": "Nokia-AX3000",              "output_file": "immortalwrt-mediatek-mt7981-nokia_ea0326gmp-squashfs-sysupgrade.bin"},
              {"name": "H3C-NX30Pro",               "output_file": "immortalwrt-mediatek-mt7981-h3c_nx30pro-squashfs-sysupgrade.bin"},
              {"name": "JCG-Q30Pro",                "output_file": "immortalwrt-mediatek-mt7981-jcg_q30-squashfs-sysupgrade.bin"},
              {"name": "Xiaomi-WR30U",              "output_file": "immortalwrt-mediatek-mt7981-xiaomi_mi-router-wr30u-112m-squashfs-sysupgrade.bin"}
            ]'

            echo "$models_json" | jq -c '.[]' | while read -r model; do
              name=$(echo "$model" | jq -r '.name')
              file=$(echo "$model" | jq -r '.output_file')
              rom="openwrt-${{ matrix.soc }}/bin/targets/mediatek/${{ matrix.soc }}/$file"
              if [ -f "$rom" ]; then
                md5=$(getmd5 "$rom")
                cp -a "$rom" "${{ matrix.soc }}_${{ matrix.kernel }}_out/AE86Wrt-$name-${{ matrix.kernel }}-${DATE}_${md5}.bin"
              else
                echo "⚠️ Not found: $rom"
              fi
            done

          elif [ "${{ matrix.type }}" = "7981_66" ]; then
            rom="openwrt-${{ matrix.soc }}/bin/targets/mediatek/filogic/immortalwrt-mediatek-filogic-qihoo_360t7-squashfs-sysupgrade.bin"
            if [ -f "$rom" ]; then
              md5=$(getmd5 "$rom")
              cp -a "$rom" "${{ matrix.soc }}_${{ matrix.kernel }}_out/AE86Wrt-360-T7-${{ matrix.kernel }}-${DATE}_${md5}.bin"
            else
              echo "⚠️ Not found: $rom"
            fi
          fi

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.soc }}-${{ matrix.kernel }}-Firmware
          path: ${{ matrix.soc }}_${{ matrix.kernel }}_out/AE86Wrt-*

      - name: Upload Config Artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.soc }}-${{ matrix.kernel }}-config
          path: ${{ matrix.soc }}_${{ matrix.kernel }}_out/${{ matrix.config_name }}

      - name: Upload Packages Artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.soc }}-${{ matrix.kernel }}-Packages
          path: openwrt-${{ matrix.soc }}/bin/packages/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@main
        with:
          path: downloaded_artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          find downloaded_artifacts -type f \( -name "*.bin" -o -name "*.tar" -o -name "*.itb" \) -exec cp {} release_assets/ \;

      - name: Generate release info
        id: release_info
        run: |
          echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "release_name=AE86Wrt-MT798x-$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ steps.release_info.outputs.release_tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          files: release_assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
