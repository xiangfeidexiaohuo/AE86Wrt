name: Build_mt798x_combined

on:
  repository_dispatch:
  workflow_dispatch:

  schedule:
    - cron: '10 23 * * 4'

jobs:
  build:
    name: Build ${{ matrix.description }} ${{ matrix.kernel || '5.4' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ───────────── 5.4 内核系列 ─────────────
          - kernel: "5.4"
            soc: "mt7981"
            config_file: "./configs/ARM/mt798x/mt7981.config"
            description: "AE86Wrt-MT7981"
            type: "standard"

          - kernel: "5.4"
            soc: "mt7986"
            config_file: "./configs/ARM/mt798x/mt7986.config"
            description: "AE86Wrt-MT7986"
            type: "standard"

          - kernel: "5.4"
            model: "mt3000"
            soc_prefix: "mt7981"
            config_file: "./configs/ARM/mt798x/mt3000.config"
            output_file: "immortalwrt-mediatek-mt7981-glinet_gl-mt3000-squashfs-sysupgrade.tar"
            output_suffix: "tar"
            description: "AE86Wrt-GL-MT3000"
            type: "gl"

          - kernel: "5.4"
            model: "mt6000"
            soc_prefix: "mt7986"
            config_file: "./configs/ARM/mt798x/mt6000.config"
            output_file: "immortalwrt-mediatek-mt7986-glinet_gl-mt6000-squashfs-sysupgrade.bin"
            output_suffix: "bin"
            description: "AE86Wrt-GL-MT6000"
            type: "gl"

          # ───────────── 6.6 内核系列 ─────────────
          - kernel: "6.6"
            type: "7981_66"
            soc: "filogic"
            config_file: "./configs/ARM/mt798x/7981_66.config"
            description: "AE86Wrt-MT7981"
            output_dir_name: "7981_66"

          - kernel: "6.6"
            type: "7986_66"
            soc: "filogic"
            config_file: "./configs/ARM/mt798x/7986_66.config"
            description: "AE86Wrt-MT7986"
            output_dir_name: "7986_66"

    steps:
      - name: Clone Repository
        uses: actions/checkout@main

      - name: Free disk space
        uses: xiangfeidexiaohuo/actions@free-disk
        with:
          build-mount-path: /home/runner/work/AE86Wrt/AE86Wrt

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          sudo apt-get update -y
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp libnsl-dev nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libfuse-dev python3-setuptools g++ file clang nano genisoimage
          sudo apt-get clean
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'noreply@github.com'

      - name: Clone source code
        env:
          REPO_URL_54: https://github.com/hanwckf/immortalwrt-mt798x
          REPO_BRANCH_54: openwrt-21.02
          REPO_URL_66: https://github.com/padavanonly/immortalwrt-mt798x-6.6
          REPO_BRANCH_66: openwrt-24.10-6.6
        run: |
          git clone https://github.com/xiangfeidexiaohuo/AE86Wrt.git && mv ./AE86Wrt/* ./ && rm -rf ./AE86Wrt

          if [ "${{ matrix.kernel }}" = "5.4" ]; then
            git clone --depth 1 $REPO_URL_54 -b $REPO_BRANCH_54 openwrt-${{ matrix.soc || matrix.model }}
            cd openwrt-${{ matrix.soc || matrix.model }}
            cp -f ../diy/mt798x/op1.sh ./
            chmod +x ./op1.sh && ./op1.sh
          else
            git clone --depth 1 $REPO_URL_66 -b $REPO_BRANCH_66 openwrt-${{ matrix.output_dir_name || matrix.type }}
            cd openwrt-${{ matrix.output_dir_name || matrix.type }}
            cp -f ../diy/mt798x/imm1.sh ./
            chmod +x ./imm1.sh && ./imm1.sh
          fi

      - name: Update & Install feeds
        working-directory: ./openwrt-${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          if [ "${{ matrix.kernel }}" = "5.4" ]; then
            cp -f ../../diy/mt798x/op2.sh ./
            chmod +x ./op2.sh && ./op2.sh
          else
            cp -f ../../diy/mt798x/imm2.sh ./
            chmod +x ./imm2.sh && ./imm2.sh
          fi

          sed -i "s/DISTRIB_DESCRIPTION='*.*'/DISTRIB_DESCRIPTION='${{ matrix.description }}-${{ matrix.kernel }}-$(date +%Y%m%d)'/g" package/base-files/files/etc/openwrt_release
          sed -i "s/OPENWRT_RELEASE=\"*.*\"/OPENWRT_RELEASE=\"${{ matrix.description }}-${{ matrix.kernel }}-$(date +%Y%m%d) By DaoDao\"/g" package/base-files/files/usr/lib/os-release

      - name: Configuration Customization
        run: |
          TARGET_DIR="openwrt-${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}"
          [ -e "${{ matrix.config_file }}" ] && mv "${{ matrix.config_file }}" $TARGET_DIR/.config
          cd $TARGET_DIR && make defconfig

      - name: Download package
        working-directory: ./openwrt-${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}
        run: |
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        working-directory: ./openwrt-${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}
        run: |
          make -j$(nproc) V=s

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          TARGET_DIR="openwrt-${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}"
          OUT_DIR="${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}_out"
          mkdir -p "$OUT_DIR"
          cp "$TARGET_DIR/.config" "$OUT_DIR/${{ matrix.soc || matrix.model || matrix.type }}.config"

          getmd5() {
            md5sum=`md5sum "$1"`
            md5=`echo ${md5sum% *}`
            echo ${md5:0:10}
          }

          DATE=$(date +%Y%m%d)

          if [ "${{ matrix.kernel }}" = "5.4" ]; then
            if [ "${{ matrix.type }}" = "standard" ]; then
              models_json='[
                {"name":"Redmi-AX6000", "file":"immortalwrt-mediatek-mt7986-xiaomi_redmi-router-ax6000-squashfs-sysupgrade.bin"},
                {"name":"JDCloud-AX6000", "file":"immortalwrt-mediatek-mt7986-jdcloud_re-cp-03-squashfs-sysupgrade.bin"},
                {"name":"Netcore-N60", "file":"immortalwrt-mediatek-mt7986-netcore_n60-squashfs-sysupgrade.bin"},
                {"name":"360-T7", "file":"immortalwrt-mediatek-mt7981-mt7981-360-t7-108M-squashfs-sysupgrade.bin"},
                {"name":"KOMI-A31", "file":"immortalwrt-mediatek-mt7981-konka_komi-a31-squashfs-sysupgrade.bin"},
                {"name":"Xiaomi-AX3000T-MTK", "file":"immortalwrt-mediatek-mt7981-xiaomi_mi-router-ax3000t-squashfs-sysupgrade.bin"},
                {"name":"Xiaomi-AX3000T-MTK_an8855", "file":"immortalwrt-mediatek-mt7981-xiaomi_mi-router-ax3000t-an8855-squashfs-sysupgrade.bin"},
                {"name":"Cetron-CT3003", "file":"immortalwrt-mediatek-mt7981-cetron_ct3003-squashfs-sysupgrade.bin"},
                {"name":"CMCC-RAX3000M", "file":"immortalwrt-mediatek-mt7981-cmcc_rax3000m-squashfs-sysupgrade.bin"},
                {"name":"Nokia-AX3000", "file":"immortalwrt-mediatek-mt7981-nokia_ea0326gmp-squashfs-sysupgrade.bin"},
                {"name":"H3C-NX30Pro", "file":"immortalwrt-mediatek-mt7981-h3c_nx30pro-squashfs-sysupgrade.bin"},
                {"name":"JCG-Q30Pro", "file":"immortalwrt-mediatek-mt7981-jcg_q30-squashfs-sysupgrade.bin"},
                {"name":"Xiaomi-WR30U", "file":"immortalwrt-mediatek-mt7981-xiaomi_mi-router-wr30u-112m-squashfs-sysupgrade.bin"}
              ]'
              echo "$models_json" | jq -c '.[]' | while read -r item; do
                name=$(echo "$item" | jq -r '.name')
                file=$(echo "$item" | jq -r '.file')
                rom="$TARGET_DIR/bin/targets/mediatek/${{ matrix.soc }}/immortalwrt-mediatek-${{ matrix.soc }}-$(basename $file)"
                if [ -f "$rom" ]; then
                  md5=$(getmd5 "$rom")
                  cp "$rom" "$OUT_DIR/AE86Wrt-$name-5.4-${DATE}_${md5}.bin"
                fi
              done
            else
              # GL.iNet 机型
              rom="$TARGET_DIR/bin/targets/mediatek/${{ matrix.soc_prefix }}/${{ matrix.output_file }}"
              if [ -f "$rom" ]; then
                md5=$(getmd5 "$rom")
                cp "$rom" "$OUT_DIR/${{ matrix.description }}-5.4-${DATE}_${md5}.${{ matrix.output_suffix }}"
              fi
            fi

          else  # 6.6 内核
            if [ "${{ matrix.type }}" = "7981_66" ]; then
              for rom in \
                "immortalwrt-mediatek-filogic-qihoo_360t7-squashfs-sysupgrade.bin" \
                "immortalwrt-mediatek-filogic-xiaomi_mi-router-wr30u-stock-initramfs-factory.ubi" \
                "immortalwrt-mediatek-filogic-xiaomi_mi-router-wr30u-stock-squashfs-sysupgrade.bin"; do
                full="$TARGET_DIR/bin/targets/mediatek/filogic/$rom"
                if [ -f "$full" ]; then
                  md5=$(getmd5 "$full")
                  base=$(basename "$rom" | sed 's/immortalwrt-mediatek-filogic-//; s/-squashfs-sysupgrade.bin//; s/-stock-initramfs-factory.ubi/-uboot/')
                  cp "$full" "$OUT_DIR/AE86Wrt-${base#*-}-6.6-${DATE}${md5:+(_${md5})}.${rom##*.}"
                fi
              done
            elif [ "${{ matrix.type }}" = "7986_66" ]; then
              for rom in \
                "immortalwrt-mediatek-filogic-xiaomi_redmi-router-ax6000-stock-initramfs-factory.ubi" \
                "immortalwrt-mediatek-filogic-xiaomi_redmi-router-ax6000-stock-squashfs-sysupgrade.bin"; do
                full="$TARGET_DIR/bin/targets/mediatek/filogic/$rom"
                if [ -f "$full" ]; then
                  md5=$(getmd5 "$full")
                  base=$(basename "$rom" | sed 's/immortalwrt-mediatek-filogic-//; s/-stock-.*//')
                  suffix=$( [[ $rom == *.ubi ]] && echo "-uboot" || echo "" )
                  cp "$full" "$OUT_DIR/AE86Wrt-${base}-6.6-${DATE}${md5:+_${md5}}${suffix}.${rom##*.}"
                fi
              done
            fi
          fi

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.soc || matrix.model || matrix.type }}-Firmware-${{ matrix.kernel }}
          path: ${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}_out/AE86Wrt-*

      - name: Upload Config Artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.soc || matrix.model || matrix.type }}-config-${{ matrix.kernel }}
          path: ${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}_out/*.config

      - name: Upload Packages Artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.soc || matrix.model || matrix.type }}-Packages-${{ matrix.kernel }}
          path: openwrt-${{ matrix.soc || matrix.model || matrix.output_dir_name || matrix.type }}/bin/packages/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@main
        with:
          path: downloaded_artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          find downloaded_artifacts -type f \( -name "*.bin" -o -name "*.tar" -o -name "*.ubi" \) -exec cp {} release_assets/ \;

      - name: Generate release info
        id: release_info
        run: |
          echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "release_name=AE86Wrt-MT798x系列-$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.release_tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          files: release_assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
